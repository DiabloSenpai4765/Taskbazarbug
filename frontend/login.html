<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - TaskBazaar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #f1e3fc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-container {
      max-width: 420px;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      padding: 40px 30px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.07);
    }
    .login-tabs {
      display: flex;
      justify-content: space-between;
      margin-bottom: 25px;
    }
    .login-tabs button {
      flex: 1;
      padding: 12px;
      font-weight: bold;
      border: none;
      background: #f5f3ff;
      color: #5e0055;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }
    .login-tabs button.active {
      border-bottom: 3px solid #5e0055;
      background: #fff;
    }
    .form-section { display: none; }
    .form-section.active { display: block; }
    form input {
      width: 100%;
      padding: 12px;
      margin-bottom: 18px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(to right, #c183c8, #d196c2);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .login-btn:hover {
      background: linear-gradient(to right, #a86edb, #f0aee0);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-tabs">
      <button id="loginTab" class="active">Login</button>
      <button id="registerTab">Register</button>
    </div>
    <div id="loginForm" class="form-section active">
      <form onsubmit="event.preventDefault(); alert('Logged in successfully!');">
        <input type="email" placeholder="Email" required />
        <input type="password" placeholder="Password" required />
        <button type="submit" class="login-btn">Login</button>
      </form>
    </div>
    <div id="registerForm" class="form-section">
       <form id="registrationForm">
        <input type="text" id="regName" placeholder="Full Name" required />
        <input type="email" id="regEmail" placeholder="Email" required />
        <input type="tel" id="regPhone" placeholder="Phone e.g. +923001234567" required />
        <div id="recaptcha-container" style="margin-bottom:18px;"></div>
        <button type="button" onclick="sendOTPRegister()" class="login-btn" style="margin-bottom:18px;">Send OTP</button>
        <div id="otpSection" style="display:none;">
          <input type="text" id="regOtp" placeholder="Enter OTP" />
          <button type="button" onclick="verifyOTPRegister()" class="login-btn" style="margin-top:10px;">Verify OTP</button>
        </div>
        <input type="password" id="regPassword" placeholder="Password" required />
        <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required />
        <button type="submit" class="login-btn">Register</button>
      </form>
    </div>
  </div>
  <script>
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    if(loginTab) loginTab.onclick = () => {
      loginTab.classList.add('active');
      registerTab.classList.remove('active');
      loginForm.classList.add('active');
      registerForm.classList.remove('active');
    };
    if(registerTab) registerTab.onclick = () => {
      registerTab.classList.add('active');
      loginTab.classList.remove('active');
      registerForm.classList.add('active');
      loginForm.classList.remove('active');
    };
  </script>
  <footer>
    <i class="bi bi-house-door-fill" onclick="window.location.href='index.html'" title="Home"></i>
    <i class="bi bi-map-fill" onclick="window.location.href='map.html'" title="Map"></i>
    <i class="bi bi-search" onclick="window.location.href='vendors-list.html'" title="Search Services"></i>
    <i class="bi bi-check2-square" onclick="alert('My Bookings feature coming soon!')" title="My Bookings (Coming Soon)"></i>
    <i class="bi bi-person-fill" onclick="window.location.href='login.html'" title="Login"></i>
  </footer>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const footerIcons = document.querySelectorAll('footer i');
      footerIcons.forEach(icon => {
        icon.addEventListener('click', () => {
          footerIcons.forEach(i => i.classList.remove('active'));
          icon.classList.add('active');
        });
      });
      const path = window.location.pathname;
      const homeIcon = document.querySelector('footer .bi-house-door-fill');
      const mapIcon = document.querySelector('footer .bi-map-fill');
      const loginIcon = document.querySelector('footer .bi-person-fill');
      if (path.includes('map.html') && mapIcon) {
        mapIcon.classList.add('active');
      } else if (path.includes('login.html') && loginIcon) {
        loginIcon.classList.add('active');
      } else if (homeIcon && (path.endsWith('/') || path.includes('index.html'))) {
        homeIcon.classList.add('active');
      }
    });
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="register.js"></script>
</body>
</html>
